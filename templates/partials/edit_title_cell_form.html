<td id="cell-title-{{ ad.id }}"
    hx-target="this" 
    hx-swap="outerHTML">
    <form hx-post="/ads/{{ ad.id }}/update-title" style="margin: 0;">
        <input type="text" 
               name="title" 
               value="{{ ad.title }}" 
               hx-trigger="blur" 
               hx-post="/ads/{{ ad.id }}/update-title"
               autofocus 
               style="margin: 0; width: 100%;">
    </form>
</td>
